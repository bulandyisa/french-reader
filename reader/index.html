<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Чтение с переводом</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="bar">
  <select id="book" title="Учебник"></select>
  <div class="nav">
    <button id="prev" title="Предыдущая (←)">‹</button>
    <span id="pageinfo">
      <input id="pagenum" type="text" inputmode="numeric" title="Введите номер страницы и нажмите Enter">
      <span id="pagesep">/</span>
      <span id="pagetotal">—</span>
    </span>
    <button id="next" title="Следующая (→)">›</button>
  </div>
  <label class="zoom">Размер
    <input id="zoom" type="range" min="40" max="100" value="70">
  </label>
  <span id="trstate" class="badge"></span>
</header>

<main id="stage">
  <div id="pagewrap">
    <img id="page" alt="">
    <div id="overlay"></div>
  </div>
  <p id="hint">Выберите учебник вверху. Кликните по слову, чтобы увидеть перевод.</p>
</main>

<div id="popup" class="hidden">
  <button id="popclose" title="Закрыть">×</button>
  <div id="pop-word"></div>
  <div id="pop-sentence"></div>
</div>

<script src="app.js"></script>
</body>
</html>
